---
- name: Ensure unattended-upgrades installed
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present
    update_cache: true

- name: Disable root SSH login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PermitRootLogin'
    line: 'PermitRootLogin no'
  notify: restart ssh

- name: Ensure UFW installed
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Allow SSH from management source (restricted)
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
    src: "{{ ssh_allowed_source }}"
  when: ssh_allowed_source | length > 0

- name: Allow SSH from anywhere (fallback — set ssh_allowed_source to restrict)
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
  when: ssh_allowed_source | length == 0

- name: Allow HTTP (Port 80)
  community.general.ufw:
    rule: allow
    port: '80'
    proto: tcp
    comment: 'HTTP Traefik'

- name: Allow HTTPS (Port 443)
  community.general.ufw:
    rule: allow
    port: '443'
    proto: tcp
    comment: 'HTTPS Traefik'

- name: Enable UFW
  community.general.ufw:
    state: enabled
