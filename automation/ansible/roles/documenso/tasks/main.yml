---
- name: Create Documenso directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0750"
    owner: root
    group: docker
  loop:
    - "{{ documenso_compose_dir }}"
    - "{{ documenso_data_dir }}"

- name: Deploy Documenso compose file
  ansible.builtin.template:
    src: compose.yml.j2
    dest: "{{ documenso_compose_dir }}/docker-compose.yml"
    mode: "0640"
    owner: root
    group: docker
  notify: restart documenso

- name: Deploy Documenso .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ documenso_compose_dir }}/.env"
    mode: "0600"
    owner: root
    group: root
  notify: restart documenso

- name: Pull Documenso images
  community.docker.docker_compose_v2_pull:
    project_src: "{{ documenso_compose_dir }}"

- name: Start Documenso stack
  community.docker.docker_compose_v2:
    project_src: "{{ documenso_compose_dir }}"
    state: present
    pull: policy

- name: Wait for Documenso to be healthy
  ansible.builtin.uri:
    url: "http://localhost:{{ documenso_port }}/api/health"
    status_code: 200
  register: health_result
  until: health_result.status == 200
  retries: "{{ documenso_health_retries }}"
  delay: "{{ documenso_health_delay }}"

- name: Documenso health confirmed
  ansible.builtin.debug:
    msg: "Documenso is healthy at http://localhost:{{ documenso_port }}"
