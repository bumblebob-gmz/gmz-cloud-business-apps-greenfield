---
- name: Install docker prerequisites
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Install docker packages
  ansible.builtin.apt:
    name:
      - docker.io
      - docker-compose-v2
    state: present

- name: Ensure docker service enabled
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Create GMZ app directory
  ansible.builtin.file:
    path: /opt/gmz/apps
    state: directory
    owner: root
    group: root
    mode: '0755'
