---
galaxy_info:
  role_name: traefik
  author: gmz
  description: Deploy Traefik reverse proxy with IONOS DNS-01 ACME on the management VM.
  min_ansible_version: "2.15"

dependencies:
  - role: docker-runtime
    # docker-runtime installs Docker CE, docker-compose-plugin and python3-docker.
    # Declaring it here removes the duplicate Docker install that was previously
    # inlined in traefik/tasks/main.yml and caused package-manager conflicts when
    # both roles were applied to the same host.
