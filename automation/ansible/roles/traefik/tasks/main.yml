---
- name: Validate required variables
  ansible.builtin.assert:
    that:
      - acme_email | length > 0
      - ionos_api_key | length > 0
    fail_msg: "acme_email and ionos_api_key must be set (never committed — pass via -e or vault)"

# Docker installation is handled by the docker-runtime role dependency
# declared in meta/main.yml — no duplicate install here.

- name: Create Traefik config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ traefik_config_dir }}"
    - "{{ traefik_dynamic_dir }}"

- name: Create acme dir with restricted permissions
  ansible.builtin.file:
    path: "{{ traefik_acme_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure acme.json exists with correct permissions
  ansible.builtin.file:
    path: "{{ traefik_acme_dir }}/acme.json"
    state: touch
    owner: root
    group: root
    mode: "0600"
    modification_time: preserve
    access_time: preserve

- name: Deploy Traefik static config
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_config_dir }}/traefik.yml"
    owner: root
    group: root
    mode: "0644"
  notify: restart traefik

- name: Deploy default dynamic config
  ansible.builtin.template:
    src: dynamic-default.yml.j2
    dest: "{{ traefik_dynamic_dir }}/default.yml"
    owner: root
    group: root
    mode: "0644"
  notify: restart traefik

- name: Deploy Docker Compose for Traefik
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_config_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0640"
  notify: restart traefik

- name: Deploy Traefik .env file with secrets
  ansible.builtin.template:
    src: traefik.env.j2
    dest: "{{ traefik_config_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Start Traefik via Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_config_dir }}"
    state: present
    pull: always
