name: Authz & Audit Regression Suite

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  authz-audit-regression:
    name: "RBAC + Audit regression tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: platform/webapp

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4- name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: platform/webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run RBAC + Audit regression suite
        run: |
          node --experimental-strip-types --test \
            tests/rbac-policy.test.mjs \
            tests/auth-context.test.ts \
            tests/token-rotation.test.ts \
            tests/audit-filters.test.ts \
            tests/audit-emit-provision-deploy.test.ts \
            tests/tenant-policy-constraints.test.ts \
          2>&1 | tee ../../test-report-authz-audit.txt
        # Exit code mirrors the test runner result (non-zero on failures)

      - name: Upload test report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4with:
          name: authz-audit-test-report
          path: test-report-authz-audit.txt
          retention-days: 30
