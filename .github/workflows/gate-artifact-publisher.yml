name: Gate Artifact Publisher

on:
  push:
    branches:
      - main

jobs:
  build-gate-bundle:
    name: "Build & Upload Gate Evidence Bundle"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4- name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5with:
          python-version: '3.11'

      - name: Build gate evidence bundle
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          BUNDLE_OUT_DIR: gate-bundle
        run: |
          chmod +x ops/scripts/build-gate-bundle.sh
          ops/scripts/build-gate-bundle.sh --out-dir gate-bundle

      - name: Upload gate evidence artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4with:
          name: g2-gate-evidence
          path: gate-bundle/
          retention-days: 90
          if-no-files-found: error

      - name: Print bundle index
        if: always()
        run: |
          echo "=== Gate Bundle Contents ==="
          ls -lh gate-bundle/
          echo ""
          cat gate-bundle/index.md
