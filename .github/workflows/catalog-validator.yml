name: Catalog Validator

on:
  push:
    paths:
      - 'catalog/**'
      - 'ops/scripts/validate_catalog.py'
      - '.github/workflows/catalog-validator.yml'
  pull_request:
    paths:
      - 'catalog/**'
      - 'ops/scripts/validate_catalog.py'
      - '.github/workflows/catalog-validator.yml'

jobs:
  validate-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate catalog
        run: python3 ops/scripts/validate_catalog.py
