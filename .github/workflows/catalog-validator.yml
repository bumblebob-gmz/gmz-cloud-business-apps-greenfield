name: Catalog Validator

on:
  push:
    paths:
      - 'catalog/**'
      - 'ops/scripts/validate_catalog.py'
      - 'ops/tests/test_validate_catalog.py'
      - '.github/workflows/catalog-validator.yml'
  pull_request:
    paths:
      - 'catalog/**'
      - 'ops/scripts/validate_catalog.py'
      - 'ops/tests/test_validate_catalog.py'
      - '.github/workflows/catalog-validator.yml'

jobs:
  validate-catalog:
    name: Validate App Catalog
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4- name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run validator unit tests
        run: python3 -m pytest ops/tests/test_validate_catalog.py -v --tb=short

      - name: Run catalog validator (field-level output)
        run: python3 ops/scripts/validate_catalog.py
