name: Gate Evidence

on:
  push:
    branches:
      - main

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Run all tests
  # -----------------------------------------------------------------------
  test:
    name: "Run Tests"
    runs-on: ubuntu-latest
    outputs:
      js_passed: ${{ steps.js_tests.outputs.passed }}
      py_passed: ${{ steps.py_tests.outputs.passed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/webapp/package-lock.json

      - name: Install Node.js dependencies
        working-directory: platform/webapp
        run: npm ci --prefer-offline

      - name: Run Node.js tests
        id: js_tests
        working-directory: platform/webapp
        run: |
          set +e
          node --experimental-strip-types --test \
            tests/rbac-policy.test.mjs \
            tests/auth-context.test.ts \
            tests/token-rotation.test.ts \
            tests/audit-filters.test.ts \
            tests/auth-alerts.test.ts \
            tests/notification-config.test.ts \
            tests/alert-dispatch.test.ts \
            tests/provisioning-sizemap.test.mjs \
            tests/traefik-config.test.mjs \
            tests/audit-emit-provision-deploy.test.ts \
            tests/opentofu-auth.test.mjs \
            tests/tenant-policy-constraints.test.ts
          EXIT_CODE=$?
          echo "passed=$([ $EXIT_CODE -eq 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: pip install pytest

      - name: Run Python tests (catalog validator)
        id: py_tests
        run: |
          set +e
          python3 -m pytest ops/tests/ -v
          EXIT_CODE=$?
          echo "passed=$([ $EXIT_CODE -eq 0 ] && echo true || echo false)" >> $GITHUB_OUTPUT
          exit $EXIT_CODE

  # -----------------------------------------------------------------------
  # Job 2: Generate gate evidence bundle (post-test)
  # Runs always so we capture partial evidence even on failure
  # -----------------------------------------------------------------------
  gate-evidence:
    name: "Publish Gate Evidence Bundle"
    runs-on: ubuntu-latest
    needs: test
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: platform/webapp/package-lock.json

      - name: Install Node.js dependencies
        working-directory: platform/webapp
        run: npm ci --prefer-offline

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python test dependencies
        run: pip install pytest

      - name: Generate gate evidence bundle
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_WORKFLOW: ${{ github.workflow }}
        run: |
          node ops/scripts/generate-gate-evidence.mjs --out gate-evidence-bundle

      - name: Upload gate evidence artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gate-evidence-${{ github.sha }}
          path: gate-evidence-bundle/
          retention-days: 90
          if-no-files-found: error

      - name: Print bundle summary
        if: always()
        run: |
          echo "=== Gate Evidence Bundle ==="
          ls -lh gate-evidence-bundle/
          echo ""
          echo "=== gate-evidence-summary.md ==="
          cat gate-evidence-bundle/gate-evidence-summary.md
