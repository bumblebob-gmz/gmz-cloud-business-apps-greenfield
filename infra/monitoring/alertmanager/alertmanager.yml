global:
  smtp_from: 'alerts@irongeeks.eu'
  smtp_smarthost: 'localhost:25'
  smtp_require_tls: false
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'tenant', 'instance']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'ops-null'

  routes:
    - match:
        severity: critical
      receiver: 'ops-null'
      repeat_interval: 1h

receivers:
  - name: 'ops-null'
    # Alerts werden über die GMZ WebApp Alert-Channels (Teams/E-Mail) verteilt.
    # Alertmanager dient als Kollektor; WebApp POST /api/auth/alerts/dispatch
    # übernimmt das Routing zu Teams und SMTP.

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['instance', 'tenant']
