services:
  orangehrm-db:
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${OHRM_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${OHRM_DB_NAME}
      MYSQL_USER: ${OHRM_DB_USER}
      MYSQL_PASSWORD: ${OHRM_DB_PASSWORD}
    volumes:
      - orangehrm_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  orangehrm:
    image: orangehrm/orangehrm:${OHRM_IMAGE_TAG}
    restart: unless-stopped
    depends_on: [orangehrm-db]
    environment:
      ORANGEHRM_DATABASE_HOST: orangehrm-db
      ORANGEHRM_DATABASE_NAME: ${OHRM_DB_NAME}
      ORANGEHRM_DATABASE_USER: ${OHRM_DB_USER}
      ORANGEHRM_DATABASE_PASSWORD: ${OHRM_DB_PASSWORD}
    volumes:
      - orangehrm_data:/var/www/html
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.orangehrm.rule: Host(`${OHRM_HOST}`)
      traefik.http.routers.orangehrm.entrypoints: websecure
      traefik.http.routers.orangehrm.tls: "true"
      traefik.http.services.orangehrm.loadbalancer.server.port: "80"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  orangehrm_db:
  orangehrm_data:
