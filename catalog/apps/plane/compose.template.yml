services:
  plane-db:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "999:999"
    environment:
      POSTGRES_DB: ${PLANE_DB_NAME}
      POSTGRES_USER: ${PLANE_DB_USER}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD}
    volumes:
      - plane_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLANE_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  plane-redis:
    image: redis:7-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "999:999"
    volumes:
      - plane_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  plane-api:
    image: makeplane/plane-backend:${PLANE_VERSION}
    # security: image drops privileges internally; no user: override required
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: python manage.py runserver 0.0.0.0:8000
    depends_on: [plane-db, plane-redis]
    environment:
      DATABASE_URL: postgresql://${PLANE_DB_USER}:${PLANE_DB_PASSWORD}@plane-db:5432/${PLANE_DB_NAME}
      REDIS_URL: ${PLANE_REDIS_URL}
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: https://${PLANE_HOST}
      CORS_ALLOWED_ORIGINS: https://${PLANE_HOST}
      DJANGO_SETTINGS_MODULE: plane.settings.production
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  plane-worker:
    image: makeplane/plane-backend:${PLANE_VERSION}
    # security: image drops privileges internally; no user: override required
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: celery -A plane worker -l info
    depends_on: [plane-db, plane-redis]
    environment:
      DATABASE_URL: postgresql://${PLANE_DB_USER}:${PLANE_DB_PASSWORD}@plane-db:5432/${PLANE_DB_NAME}
      REDIS_URL: ${PLANE_REDIS_URL}
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: https://${PLANE_HOST}
      CORS_ALLOWED_ORIGINS: https://${PLANE_HOST}
      DJANGO_SETTINGS_MODULE: plane.settings.production
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  plane-beat:
    image: makeplane/plane-backend:${PLANE_VERSION}
    # security: image drops privileges internally; no user: override required
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    entrypoint: celery -A plane beat -l info
    depends_on: [plane-db, plane-redis]
    environment:
      DATABASE_URL: postgresql://${PLANE_DB_USER}:${PLANE_DB_PASSWORD}@plane-db:5432/${PLANE_DB_NAME}
      REDIS_URL: ${PLANE_REDIS_URL}
      SECRET_KEY: ${PLANE_SECRET_KEY}
      WEB_URL: https://${PLANE_HOST}
      CORS_ALLOWED_ORIGINS: https://${PLANE_HOST}
      DJANGO_SETTINGS_MODULE: plane.settings.production
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  plane-frontend:
    image: makeplane/plane-frontend:${PLANE_VERSION}
    # security: image drops privileges internally; no user: override required
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on: [plane-api]
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://${PLANE_HOST}
      NEXT_PUBLIC_DEPLOY_URL: https://${PLANE_HOST}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.plane.rule: Host(`${PLANE_HOST}`)
      traefik.http.routers.plane.entrypoints: websecure
      traefik.http.routers.plane.tls: "true"
      traefik.http.services.plane.loadbalancer.server.port: "3000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  plane_db:
  plane_redis:
