services:
  joplin-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: joplin
      POSTGRES_USER: joplin
      POSTGRES_PASSWORD: ${JOPLIN_DB_PASSWORD}
    volumes:
      - joplin_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U joplin"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  joplin:
    image: joplin/server:${JOPLIN_VERSION}
    restart: unless-stopped
    depends_on:
      joplin-db:
        condition: service_healthy
    environment:
      APP_PORT: "22300"
      APP_BASE_URL: https://${JOPLIN_HOST}
      DB_CLIENT: pg
      POSTGRES_CONNECTION_STRING: postgresql://joplin:${JOPLIN_DB_PASSWORD}@joplin-db:5432/joplin
      MAILER_ENABLED: "1"
      MAILER_HOST: ${SMTP_HOST}
      MAILER_PORT: ${SMTP_PORT}
      MAILER_SECURITY: starttls
      MAILER_AUTH_USER: ${SMTP_USER}
      MAILER_AUTH_PASSWORD: ${SMTP_PASS}
      MAILER_NOREPLY_NAME: Joplin
      MAILER_NOREPLY_EMAIL: ${SMTP_FROM}
    volumes:
      - joplin_data:/home/joplin/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:22300/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.joplin.rule: Host(`${JOPLIN_HOST}`)
      traefik.http.routers.joplin.entrypoints: websecure
      traefik.http.routers.joplin.tls.certresolver: ionos
      traefik.http.services.joplin.loadbalancer.server.port: "22300"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  joplin_db_data:
  joplin_data:
