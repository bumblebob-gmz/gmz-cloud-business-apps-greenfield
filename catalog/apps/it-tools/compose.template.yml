services:
  it-tools:
    image: corentinth/it-tools:${IT_TOOLS_VERSION}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    labels:
      traefik.enable: "true"
      traefik.http.routers.it-tools.rule: Host(`${IT_TOOLS_HOST}`)
      traefik.http.routers.it-tools.entrypoints: websecure
      traefik.http.routers.it-tools.tls.certresolver: ionos
      traefik.http.services.it-tools.loadbalancer.server.port: "80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 64M
