services:
  documenso:
    image: documenso/documenso:${DOCUMENSO_IMAGE_TAG:-1.5.6}
    container_name: documenso
    restart: unless-stopped
    user: "1000:1000"
    depends_on:
      documenso-db:
        condition: service_healthy
    environment:
      NEXTAUTH_URL: "https://${DOCUMENSO_HOST}"
      NEXTAUTH_SECRET: "${DOCUMENSO_SECRET_KEY}"
      NEXT_PUBLIC_WEBAPP_URL: "https://${DOCUMENSO_HOST}"
      DATABASE_URL: "postgresql://documenso:${DOCUMENSO_DB_PASSWORD}@documenso-db:5432/documenso"
      NEXT_PRIVATE_ENCRYPTION_KEY: "${DOCUMENSO_ENCRYPTION_KEY}"
      NEXT_PRIVATE_ENCRYPTION_SECONDARY_KEY: "${DOCUMENSO_ENCRYPTION_KEY_SECONDARY}"
      NEXT_PRIVATE_SMTP_HOST: "${DOCUMENSO_SMTP_HOST}"
      NEXT_PRIVATE_SMTP_PORT: "${DOCUMENSO_SMTP_PORT:-587}"
      NEXT_PRIVATE_SMTP_USERNAME: "${DOCUMENSO_SMTP_USER}"
      NEXT_PRIVATE_SMTP_PASSWORD: "${DOCUMENSO_SMTP_PASS}"
      NEXT_PRIVATE_SMTP_FROM_ADDRESS: "${DOCUMENSO_SMTP_FROM}"
      NEXT_PRIVATE_SMTP_FROM_NAME: "${DOCUMENSO_SMTP_FROM_NAME:-Documenso}"
      NEXT_PRIVATE_SMTP_SECURE: "${DOCUMENSO_SMTP_SECURE:-false}"
      NEXT_PRIVATE_OIDC_WELL_KNOWN: "${DOCUMENSO_OIDC_WELL_KNOWN:-}"
      NEXT_PRIVATE_OIDC_CLIENT_ID: "${DOCUMENSO_OIDC_CLIENT_ID:-}"
      NEXT_PRIVATE_OIDC_CLIENT_SECRET: "${DOCUMENSO_OIDC_CLIENT_SECRET:-}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.documenso.rule: Host(`${DOCUMENSO_HOST}`)
      traefik.http.routers.documenso.entrypoints: websecure
      traefik.http.routers.documenso.tls.certresolver: ionos
      traefik.http.services.documenso.loadbalancer.server.port: "3000"
    volumes:
      - documenso_uploads:/app/public/uploads
    networks:
      - documenso_net
      - traefik_proxy
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  documenso-db:
    image: postgres:16-alpine
    restart: unless-stopped
    user: "999:999"
    environment:
      POSTGRES_DB: documenso
      POSTGRES_USER: documenso
      POSTGRES_PASSWORD: "${DOCUMENSO_DB_PASSWORD}"
    volumes:
      - documenso_db:/var/lib/postgresql/data
    networks:
      - documenso_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U documenso"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  documenso_uploads:
  documenso_db:

networks:
  documenso_net:
    driver: bridge
  traefik_proxy:
    external: true
