services:
  taiga-db:
    image: postgres:15-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "999:999"
    environment:
      POSTGRES_DB: ${TAIGA_DB_NAME}
      POSTGRES_USER: ${TAIGA_DB_USER}
      POSTGRES_PASSWORD: ${TAIGA_DB_PASSWORD}
    volumes:
      - taiga_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TAIGA_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  taiga-redis:
    image: redis:6-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "999:999"
    volumes:
      - taiga_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 64M

  taiga-rabbitmq:
    image: taigaio/taiga-async-rabbitmq:${TAIGA_VERSION}
    # security: image drops privileges internally; no user: override required
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      RABBITMQ_DEFAULT_USER: ${TAIGA_RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${TAIGA_RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${TAIGA_RABBITMQ_VHOST}
    volumes:
      - taiga_rabbitmq:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  taiga-back:
    image: taigaio/taiga-back:${TAIGA_VERSION}
    # security: image drops privileges internally; no user: override required
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on: [taiga-db, taiga-redis, taiga-rabbitmq]
    environment:
      POSTGRES_DB: ${TAIGA_DB_NAME}
      POSTGRES_USER: ${TAIGA_DB_USER}
      POSTGRES_PASSWORD: ${TAIGA_DB_PASSWORD}
      POSTGRES_HOST: taiga-db
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
      TAIGA_SITES_SCHEME: https
      TAIGA_SITES_DOMAIN: ${TAIGA_HOST}
      RABBITMQ_USER: ${TAIGA_RABBITMQ_USER}
      RABBITMQ_PASS: ${TAIGA_RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${TAIGA_RABBITMQ_VHOST}
      REDIS_URL: redis://taiga-redis:6379
    volumes:
      - taiga_static_data:/taiga-back/static
      - taiga_media_data:/taiga-back/media
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  taiga-async:
    image: taigaio/taiga-async:${TAIGA_VERSION}
    # security: image drops privileges internally; no user: override required
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on: [taiga-db, taiga-redis, taiga-rabbitmq]
    environment:
      POSTGRES_DB: ${TAIGA_DB_NAME}
      POSTGRES_USER: ${TAIGA_DB_USER}
      POSTGRES_PASSWORD: ${TAIGA_DB_PASSWORD}
      POSTGRES_HOST: taiga-db
      TAIGA_SECRET_KEY: ${TAIGA_SECRET_KEY}
      TAIGA_SITES_SCHEME: https
      TAIGA_SITES_DOMAIN: ${TAIGA_HOST}
      RABBITMQ_USER: ${TAIGA_RABBITMQ_USER}
      RABBITMQ_PASS: ${TAIGA_RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${TAIGA_RABBITMQ_VHOST}
      REDIS_URL: redis://taiga-redis:6379
    volumes:
      - taiga_static_data:/taiga-back/static
      - taiga_media_data:/taiga-back/media
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  taiga-events:
    image: taigaio/taiga-events:${TAIGA_VERSION}
    # security: image drops privileges internally; no user: override required
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on: [taiga-rabbitmq]
    environment:
      RABBITMQ_URL: amqp://${TAIGA_RABBITMQ_USER}:${TAIGA_RABBITMQ_PASSWORD}@taiga-rabbitmq:5672/${TAIGA_RABBITMQ_VHOST}
      SECRET_KEY: ${TAIGA_SECRET_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  taiga-protected:
    image: taigaio/taiga-protected:${TAIGA_VERSION}
    # security: image drops privileges internally; no user: override required
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      MAX_AGE: "360"
      SECRET_KEY: ${TAIGA_SECRET_KEY}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  taiga-front:
    image: taigaio/taiga-front:${TAIGA_VERSION}
    # security: image drops privileges internally; no user: override required
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    depends_on: [taiga-back, taiga-events]
    environment:
      TAIGA_URL: https://${TAIGA_HOST}
      TAIGA_WEBSOCKETS_URL: wss://${TAIGA_HOST}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.taiga.rule: Host(`${TAIGA_HOST}`)
      traefik.http.routers.taiga.entrypoints: websecure
      traefik.http.routers.taiga.tls: "true"
      traefik.http.services.taiga.loadbalancer.server.port: "80"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  taiga_db:
  taiga_redis:
  taiga_rabbitmq:
  taiga_static_data:
  taiga_media_data:
