services:
  metabase-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MB_DB_NAME}
      POSTGRES_USER: ${MB_DB_USER}
      POSTGRES_PASSWORD: ${MB_DB_PASSWORD}
    volumes:
      - metabase_db:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase:${MB_IMAGE_TAG}
    restart: unless-stopped
    depends_on: [metabase-db]
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: ${MB_DB_NAME}
      MB_DB_PORT: "5432"
      MB_DB_USER: ${MB_DB_USER}
      MB_DB_PASS: ${MB_DB_PASSWORD}
      MB_DB_HOST: metabase-db
      MB_ENCRYPTION_SECRET_KEY: ${MB_ENCRYPTION_SECRET_KEY}
      MB_SITE_NAME: ${MB_SITE_NAME}
      JAVA_TIMEZONE: ${MB_JAVA_TIMEZONE}
    labels:
      traefik.enable: "true"
      traefik.http.routers.metabase.rule: Host(`${MB_HOST}`)
      traefik.http.routers.metabase.entrypoints: websecure
      traefik.http.routers.metabase.tls: "true"
      traefik.http.services.metabase.loadbalancer.server.port: "3000"
    volumes:
      - metabase_data:/metabase-data

volumes:
  metabase_db:
  metabase_data:
