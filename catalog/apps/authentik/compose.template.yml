services:
  authentik-postgresql:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${AUTHENTIK_DB_NAME}
      POSTGRES_USER: ${AUTHENTIK_DB_USER}
      POSTGRES_PASSWORD: ${AUTHENTIK_DB_PASSWORD}
    volumes:
      - authentik_postgres_data:/var/lib/postgresql/data

  authentik-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - authentik_redis_data:/data

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_IMAGE_TAG}
    restart: unless-stopped
    command: server
    depends_on:
      - authentik-postgresql
      - authentik-redis
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_ERROR_REPORTING__ENABLED: "false"
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__PORT: "5432"
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_REDIS__PORT: "6379"
      AUTHENTIK_COOKIE_DOMAIN: ${BASE_DOMAIN}
    labels:
      traefik.enable: "true"
      traefik.http.routers.authentik.rule: Host(`${AUTHENTIK_HOST}`)
      traefik.http.routers.authentik.entrypoints: websecure
      traefik.http.routers.authentik.tls: "true"
      traefik.http.services.authentik.loadbalancer.server.port: "9000"
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_IMAGE_TAG}
    restart: unless-stopped
    command: worker
    depends_on:
      - authentik-postgresql
      - authentik-redis
      - authentik-socket-proxy
    environment:
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__PORT: "5432"
      AUTHENTIK_POSTGRESQL__NAME: ${AUTHENTIK_DB_NAME}
      AUTHENTIK_POSTGRESQL__USER: ${AUTHENTIK_DB_USER}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${AUTHENTIK_DB_PASSWORD}
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_REDIS__PORT: "6379"
      DOCKER_HOST: tcp://authentik-socket-proxy:2375
    volumes:
      - authentik_media:/media
      - authentik_certs:/certs
      - authentik_templates:/templates
    networks:
      - authentik_net
      - proxy_net

  authentik-socket-proxy:
    image: tecnativa/docker-socket-proxy:0.1.2
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      NETWORKS: 0
      VOLUMES: 0
      POST: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - proxy_net

volumes:
  authentik_postgres_data:
  authentik_redis_data:
  authentik_media:
  authentik_certs:
  authentik_templates:

networks:
  authentik_net:
  proxy_net:
    driver: bridge
    internal: true
