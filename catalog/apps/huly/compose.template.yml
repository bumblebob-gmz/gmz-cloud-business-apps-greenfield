services:
  huly-mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - huly_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  huly-minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${HULY_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${HULY_MINIO_ROOT_PASSWORD}
    volumes:
      - huly_minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/minio/health/live || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  huly-elastic:
    image: elasticsearch:7.14.2
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes:
      - huly_elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M

  huly-account:
    image: hardcoreeng/account:${HULY_VERSION}
    restart: unless-stopped
    depends_on: [huly-mongo, huly-minio]
    environment:
      SERVER_SECRET: ${HULY_SECRET}
      MONGO_URL: ${HULY_DB_URL}
      MINIO_ENDPOINT: huly-minio
      MINIO_ACCESS_KEY: ${HULY_MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${HULY_MINIO_ROOT_PASSWORD}
      FRONT_URL: https://${HULY_HOST}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  huly-front:
    image: hardcoreeng/front:${HULY_VERSION}
    restart: unless-stopped
    depends_on: [huly-account, huly-elastic]
    environment:
      SERVER_PORT: "8083"
      SERVER_SECRET: ${HULY_SECRET}
      ACCOUNTS_URL: http://huly-account:3000
      MINIO_ENDPOINT: huly-minio
      MINIO_ACCESS_KEY: ${HULY_MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${HULY_MINIO_ROOT_PASSWORD}
      ELASTIC_URL: ${HULY_ELASTIC_URL}
      MONGO_URL: ${HULY_DB_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.huly.rule: Host(`${HULY_HOST}`)
      traefik.http.routers.huly.entrypoints: websecure
      traefik.http.routers.huly.tls: "true"
      traefik.http.services.huly.loadbalancer.server.port: "8083"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  huly-collaborator:
    image: hardcoreeng/collaborator:${HULY_VERSION}
    restart: unless-stopped
    depends_on: [huly-account, huly-mongo]
    environment:
      SERVER_SECRET: ${HULY_SECRET}
      ACCOUNTS_URL: http://huly-account:3000
      MONGO_URL: ${HULY_DB_URL}
      MINIO_ENDPOINT: huly-minio
      MINIO_ACCESS_KEY: ${HULY_MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${HULY_MINIO_ROOT_PASSWORD}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  huly-transactor:
    image: hardcoreeng/transactor:${HULY_VERSION}
    restart: unless-stopped
    depends_on: [huly-account, huly-mongo, huly-elastic]
    environment:
      SERVER_SECRET: ${HULY_SECRET}
      ACCOUNTS_URL: http://huly-account:3000
      MONGO_URL: ${HULY_DB_URL}
      MINIO_ENDPOINT: huly-minio
      MINIO_ACCESS_KEY: ${HULY_MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${HULY_MINIO_ROOT_PASSWORD}
      ELASTIC_URL: ${HULY_ELASTIC_URL}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

volumes:
  huly_mongo_data:
  huly_minio_data:
  huly_elastic_data:
