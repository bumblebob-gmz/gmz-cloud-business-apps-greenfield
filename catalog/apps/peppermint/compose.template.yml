services:
  peppermint-db:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "999:999"
    environment:
      POSTGRES_DB: ${PP_DB_NAME}
      POSTGRES_USER: ${PP_DB_USER}
      POSTGRES_PASSWORD: ${PP_DB_PASSWORD}
    volumes:
      - peppermint_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PP_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  peppermint:
    image: peppermint/peppermint:${PP_IMAGE_TAG}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    depends_on:
      - peppermint-db
    environment:
      DB_USERNAME: ${PP_DB_USER}
      DB_PASSWORD: ${PP_DB_PASSWORD}
      DB_HOST: peppermint-db
      DB_PORT: "5432"
      DB_NAME: ${PP_DB_NAME}
      SECRET: a_super_secret_key_here
      BASE_URL: https://${PP_HOST}
    volumes:
      - peppermint_uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.peppermint.rule: Host(`${PP_HOST}`)
      traefik.http.routers.peppermint.entrypoints: websecure
      traefik.http.routers.peppermint.tls: "true"
      traefik.http.services.peppermint.loadbalancer.server.port: "3000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  peppermint_db:
  peppermint_uploads:
