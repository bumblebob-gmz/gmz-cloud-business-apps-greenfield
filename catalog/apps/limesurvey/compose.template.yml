services:
  limesurvey-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${LS_DB_NAME}
      POSTGRES_USER: ${LS_DB_USER}
      POSTGRES_PASSWORD: ${LS_DB_PASSWORD}
    volumes:
      - limesurvey_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${LS_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  limesurvey:
    image: martialblog/limesurvey:${LS_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - limesurvey-db
    environment:
      DB_TYPE: ${LS_DB_TYPE}
      DB_HOST: limesurvey-db
      DB_PORT: "5432"
      DB_NAME: ${LS_DB_NAME}
      DB_USERNAME: ${LS_DB_USER}
      DB_PASSWORD: ${LS_DB_PASSWORD}
      ADMIN_USER: ${LS_ADMIN_USER}
      ADMIN_PASSWORD: ${LS_ADMIN_PASSWORD}
      ADMIN_EMAIL: ${LS_ADMIN_EMAIL}
      ADMIN_NAME: ${LS_ADMIN_NAME}
      PUBLIC_URL: https://${LS_HOST}
      LISTEN_PORT: "8080"
    volumes:
      - limesurvey_upload:/var/www/html/upload
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.limesurvey.rule: Host(`${LS_HOST}`)
      traefik.http.routers.limesurvey.entrypoints: websecure
      traefik.http.routers.limesurvey.tls: "true"
      traefik.http.services.limesurvey.loadbalancer.server.port: "8080"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  limesurvey_db:
  limesurvey_upload:
