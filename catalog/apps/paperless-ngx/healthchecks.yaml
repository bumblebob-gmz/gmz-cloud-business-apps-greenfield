checks:
  - id: paperless-api
    type: http
    target: https://paperless.{tenant}.irongeeks.eu/api/
    expectedStatus: 200
    intervalSeconds: 30
    timeoutSeconds: 5

  - id: paperless-login
    type: http
    target: https://paperless.{tenant}.irongeeks.eu/accounts/login/
    expectedStatus: 200
    intervalSeconds: 60
    timeoutSeconds: 5
