services:
  wiki-js-db:
    image: postgres:16-alpine
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "999:999"
    environment:
      POSTGRES_DB: wikijs
      POSTGRES_USER: wikijs
      POSTGRES_PASSWORD: ${WIKIJS_DB_PASSWORD}
    volumes:
      - wikijs_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikijs"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  wiki-js:
    image: ghcr.io/requarks/wiki:${WIKIJS_VERSION}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "1000:1000"
    depends_on:
      wiki-js-db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: wiki-js-db
      DB_PORT: "5432"
      DB_NAME: wikijs
      DB_USER: wikijs
      DB_PASS: ${WIKIJS_DB_PASSWORD}
    volumes:
      - wikijs_data:/wiki/data/content
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.wiki-js.rule: Host(`${WIKIJS_HOST}`)
      traefik.http.routers.wiki-js.entrypoints: websecure
      traefik.http.routers.wiki-js.tls.certresolver: ionos
      traefik.http.services.wiki-js.loadbalancer.server.port: "3000"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  wikijs_db_data:
  wikijs_data:
