services:
  wiki-js-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wikijs
      POSTGRES_USER: wikijs
      POSTGRES_PASSWORD: ${WIKIJS_DB_PASSWORD}
    volumes:
      - wikijs_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wikijs"]
      interval: 30s
      timeout: 10s
      retries: 3

  wiki-js:
    image: ghcr.io/requarks/wiki:${WIKIJS_VERSION}
    restart: unless-stopped
    depends_on:
      wiki-js-db:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: wiki-js-db
      DB_PORT: "5432"
      DB_NAME: wikijs
      DB_USER: wikijs
      DB_PASS: ${WIKIJS_DB_PASSWORD}
    volumes:
      - wikijs_data:/wiki/data/content
    labels:
      traefik.enable: "true"
      traefik.http.routers.wiki-js.rule: Host(`${WIKIJS_HOST}`)
      traefik.http.routers.wiki-js.entrypoints: websecure
      traefik.http.routers.wiki-js.tls.certresolver: ionos
      traefik.http.services.wiki-js.loadbalancer.server.port: "3000"

volumes:
  wikijs_db_data:
  wikijs_data:
