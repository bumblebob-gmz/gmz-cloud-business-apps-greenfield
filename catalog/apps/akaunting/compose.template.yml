services:
  akaunting-db:
    image: mysql:8
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${AK_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${AK_DB_NAME}
      MYSQL_USER: ${AK_DB_USER}
      MYSQL_PASSWORD: ${AK_DB_PASSWORD}
    volumes:
      - akaunting_db:/var/lib/mysql

  akaunting:
    image: akaunting/akaunting:${AK_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - akaunting-db
    environment:
      APP_URL: https://${AK_HOST}
      DB_HOST: akaunting-db
      DB_DATABASE: ${AK_DB_NAME}
      DB_USERNAME: ${AK_DB_USER}
      DB_PASSWORD: ${AK_DB_PASSWORD}
      COMPANY_NAME: ${AK_COMPANY_NAME}
      COMPANY_EMAIL: ${AK_COMPANY_EMAIL}
      ADMIN_EMAIL: ${AK_ADMIN_EMAIL}
      ADMIN_PASSWORD: ${AK_ADMIN_PASSWORD}
    labels:
      traefik.enable: "true"
      traefik.http.routers.akaunting.rule: Host(`${AK_HOST}`)
      traefik.http.routers.akaunting.entrypoints: websecure
      traefik.http.routers.akaunting.tls: "true"
      traefik.http.services.akaunting.loadbalancer.server.port: "80"
    volumes:
      - akaunting_data:/var/www/html/storage

volumes:
  akaunting_db:
  akaunting_data:
