checks:
  - id: bookstack-web
    type: http
    target: https://bookstack.{tenant}.irongeeks.eu/
    expectedStatus: 200
    intervalSeconds: 30
    timeoutSeconds: 5

  - id: bookstack-login
    type: http
    target: https://bookstack.{tenant}.irongeeks.eu/login
    expectedStatus: 200
    intervalSeconds: 60
    timeoutSeconds: 5
