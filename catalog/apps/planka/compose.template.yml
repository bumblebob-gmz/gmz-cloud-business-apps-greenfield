services:
  planka-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PLANKA_DB_NAME}
      POSTGRES_USER: ${PLANKA_DB_USER}
      POSTGRES_PASSWORD: ${PLANKA_DB_PASSWORD}
    volumes:
      - planka_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLANKA_DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  planka:
    image: ghcr.io/plankanban/planka:${PLANKA_IMAGE_TAG}
    restart: unless-stopped
    depends_on:
      - planka-db
    environment:
      DATABASE_URL: postgresql://${PLANKA_DB_USER}:${PLANKA_DB_PASSWORD}@planka-db:5432/${PLANKA_DB_NAME}
      BASE_URL: https://${PLANKA_HOST}
      SECRET_KEY: ${PLANKA_SECRET_KEY}
      DEFAULT_ADMIN_EMAIL: ${PLANKA_DEFAULT_ADMIN_EMAIL}
      DEFAULT_ADMIN_PASSWORD: ${PLANKA_DEFAULT_ADMIN_PASSWORD}
      DEFAULT_ADMIN_NAME: ${PLANKA_DEFAULT_ADMIN_NAME}
      DEFAULT_ADMIN_USERNAME: ${PLANKA_DEFAULT_ADMIN_USERNAME}
    volumes:
      - planka_user_avatars:/app/public/user-avatars
      - planka_project_bg:/app/public/project-background-images
      - planka_attachments:/app/private/attachments
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1337/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    labels:
      traefik.enable: "true"
      traefik.http.routers.planka.rule: Host(`${PLANKA_HOST}`)
      traefik.http.routers.planka.entrypoints: websecure
      traefik.http.routers.planka.tls: "true"
      traefik.http.services.planka.loadbalancer.server.port: "1337"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

volumes:
  planka_db:
  planka_user_avatars:
  planka_project_bg:
  planka_attachments:
